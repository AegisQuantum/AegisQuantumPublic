<style>
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    animation: fadeUp 0.25s ease;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    transition: color var(--transition);
  }

  .modal-close:hover { color: var(--text); }

  .modal-desc {
    font-size: 0.83rem;
    color: var(--text-muted);
    line-height: 1.55;
  }

  .fingerprint-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }

  .fp-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .fp-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
  }

  .fp-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1rem;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 0.75rem;
  }

  .fp-status.verified {
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.2);
    color: var(--success);
  }

  .fp-status.unverified {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.2);
    color: var(--warning);
  }

  .fp-status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
</style>

<div class="modal-overlay" id="fingerprint-modal">
  <div class="modal-card">

    <div class="modal-header">
      <span class="modal-title">Safety Numbers</span>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>

    <p class="modal-desc">
      Compare these numbers with your contact through a trusted channel.
      If they match, your conversation is secure and has not been intercepted.
    </p>

    <div>
      <div class="fp-label">Your identity — ML-DSA-65 fingerprint</div>
      <div class="fingerprint-grid" id="fp-own">
        <!-- 8 blocs injectés par fingerprint.ts -->

    </div>

    <div>
      <div class="fp-label">Contact fingerprint</div>
      <div class="fingerprint-grid" id="fp-contact">
        <!-- 8 blocs injectés par fingerprint.ts -->
      </div>
    </div>

    <div class="fp-status unverified" id="fp-status">
      Not yet verified — compare out-of-band
    </div>

  </div>
</div>
